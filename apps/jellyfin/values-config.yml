---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
fullnameOverride: jellyfin

image:
  repository: ghcr.io/jellyfin/jellyfin
  tag: "10.11.11"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: media.cjf.sh
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - media.cjf.sh

deploymentStrategy:
  type: Recreate

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

persistence:
  config:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: zfs-dataset

  media:
    enabled: false

volumes:
  - name: media
    nfs:
      server: 192.168.200.13
      path: /var/tank/media

  - name: temp-data
    emptyDir: {}

volumeMounts:
  - mountPath: /media
    name: media
    readOnly: true

  - name: temp-data
    mountPath: "/tmp"

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
