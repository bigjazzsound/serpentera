# Network Share Configuration Example
# Replace the persistence section in values-config.yml with this configuration

persistence:
  # Configuration storage - keep on fast local storage
  config:
    type: persistentVolumeClaim
    storageClass: zfs-dataset
    accessMode: ReadWriteOnce
    size: 5Gi
    globalMounts:
      - path: /config

  # Calibre library on NFS share
  library:
    type: nfs
    server: "192.168.1.100"               # Replace with your NFS server IP
    path: "/volume1/calibre/library"      # Replace with your NFS export path
    globalMounts:
      - path: /calibre-library

  # Book ingest folder on NFS share  
  ingest:
    type: nfs
    server: "192.168.1.100"               # Replace with your NFS server IP
    path: "/volume1/calibre/ingest"       # Replace with your NFS export path
    globalMounts:
      - path: /cwa-book-ingest

# Environment variables for network share optimization
# (These are already set in the main values-config.yml)
# env:
#   NETWORK_SHARE_MODE: "true"
#   PUID: "1000" 
#   PGID: "1000"

# NFS Server Requirements:
# - NFS exports configured with proper permissions
# - User ID 1000 should have read/write access
# - Recommend: all_squash,anonuid=1000,anongid=1000 for security
# 
# Example /etc/exports entry:
# /volume1/calibre *(rw,sync,no_subtree_check,all_squash,anonuid=1000,anongid=1000)