---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: generic-device-plugin
  namespace: flux-system
spec:
  chart:
    spec:
      chart: generic-device-plugin
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: generic-device-plugin
      version: 0.1.2
  install:
    createNamespace: true
  interval: 1m0s
  storageNamespace: generic-device-plugin
  targetNamespace: generic-device-plugin
  valuesFrom:
  - kind: ConfigMap
    name: generic-device-plugin-config-values
