---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: flux-system
spec:
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: navidrome
      version: 4.6.2
  install:
    createNamespace: true
  interval: 1m0s
  storageNamespace: navidrome
  targetNamespace: navidrome
  valuesFrom:
    - kind: ConfigMap
      name: navidrome-config-values
