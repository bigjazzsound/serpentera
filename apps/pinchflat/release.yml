---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pinchflat
  namespace: flux-system
spec:
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: pinchflat
      version: 5.0.1
  install:
    createNamespace: true
  interval: 1m0s
  storageNamespace: pinchflat
  targetNamespace: pinchflat
  valuesFrom:
    - kind: ConfigMap
      name: pinchflat-config-values
