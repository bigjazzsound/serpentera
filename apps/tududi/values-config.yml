---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
global:
  fullnameOverride: tududi

controllers:
  tududi:
    containers:
      app:
        image:
          repository: docker.io/chrisvel/tududi
          tag: 1.0.0
        envFrom:
          - secret: tududi

service:
  app:
    controller: tududi
    ports:
      http:
        port: 3002

ingress:
  app:
    className: nginx
    hosts:
      - host: tududi.cjf.sh
        paths:
          - path: /
            service:
              identifier: app
              port: http
    tls:
      - hosts:
          - tududi.cjf.sh

persistence:
  data:
    type: persistentVolumeClaim
    storageClass: zfs-dataset
    accessMode: ReadWriteOnce
    size: 5Gi
    globalMounts:
      - path: /app/backend/db

  uploads:
    type: persistentVolumeClaim
    storageClass: zfs-dataset
    accessMode: ReadWriteOnce
    size: 2Gi
    globalMounts:
      - path: /app/backend/uploads

