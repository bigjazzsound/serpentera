---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-gpu
  namespace: flux-system
spec:
  chart:
    spec:
      chart: intel-device-plugins-gpu
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: intel-device-plugins
      version: 0.36.0
  dependsOn:
    - name: node-feature-discovery
    - name: cert-manager
  install:
    createNamespace: true
  interval: 1m0s
  storageNamespace: intel-device-plugins-gpu
  targetNamespace: intel-device-plugins-gpu
  valuesFrom:
    - kind: ConfigMap
      name: intel-device-plugins-gpu-config-values
