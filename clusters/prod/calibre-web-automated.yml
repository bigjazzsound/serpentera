---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calibre-web-automated
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./apps/calibre-web-automated
  prune: true
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m0s
  wait: true
  dependsOn:
    - name: ingress-nginx
    - name: storageclasses